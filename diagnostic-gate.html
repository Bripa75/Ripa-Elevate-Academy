<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Diagnostic Gate</title>
  <script>
    (function () {
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.get('clear') === '1') {
          try { localStorage.removeItem('rea_diag_last_code'); } catch {}
        }
        const code = (params.get('code') || '').trim();
        if (code) {
          location.replace(`diagnostic/diagnostic-test.html?code=${encodeURIComponent(code)}`);
          return;
        }
        // Default: send the user to lock, which validates the code in Supabase
        location.replace('lock.html');
      } catch (e) {
        location.replace('lock.html');
      }
    })();
  </script>
</head>
<body style="font-family:system-ui;padding:24px">
  Routing…
</body>
</html>
