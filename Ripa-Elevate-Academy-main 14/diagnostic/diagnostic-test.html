<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Ripa Diagnostic — Test</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<link href="./styles.css" rel="stylesheet"/>
<style>
    #errBanner {
      display:none;
      margin:12px 0;
      padding:10px 12px;
      border-radius:8px;
      background:#3b0d0d;
      color:#ffd7d7;
      border:1px solid #a33;
    }
  </style>
<meta content="Take the Smart Diagnostic test. Your results help pinpoint exact gaps and generate a targeted action plan." name="description"/><meta content="#0a0a0a" name="theme-color"/><meta content="Ripa Diagnostic — Test" property="og:title"/><meta content="Take the Smart Diagnostic test. Your results help pinpoint exact gaps and generate a targeted action plan." property="og:description"/><meta content="website" property="og:type"/><meta content="../Brian_Square_Profile.png" property="og:image"/><meta content="summary_large_image" name="twitter:card"/><meta content="Ripa Diagnostic — Test" name="twitter:title"/><meta content="Take the Smart Diagnostic test. Your results help pinpoint exact gaps and generate a targeted action plan." name="twitter:description"/><meta content="../Brian_Square_Profile.png" name="twitter:image"/><link href="../Brian_Square_Profile.png" rel="icon" type="image/png"/></head>
<body>
<div class="bg-gradient"></div>
<header>
<div class="container row">
<div class="brand"><span class="orb"></span> Ripa Diagnostic</div>
<nav><a class="btn" href="../index.html">Back</a></nav>
</div>
</header>
<main class="container">
<div id="errBanner"></div>
<section class="examCard">
<div class="stage">
<div>
<div class="examTitle">Baseline Diagnostic</div>
<p class="examMuted">Adaptive: 10 Math then 10 English (Grades 2–8)</p>
<div style="margin-top:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
<label class="label" for="grade">Grade</label>
<select class="btn" id="grade" style="padding:10px 12px">
<option value="2">2</option><option value="3">3</option>
<option value="4">4</option><option value="5">5</option>
<option value="6">6</option><option selected="" value="7">7</option>
<option value="8">8</option>
</select>
<label class="label" for="accessCode">Access code</label>
<input autocomplete="off" class="btn" id="accessCode" placeholder="Enter access code" style="padding:10px 12px"/>
<label class="label" for="studentName">Name</label>
<input class="btn" id="studentName" placeholder="(optional)" style="padding:10px 12px"/>
<label class="label" for="parentEmail">Parent email</label>
<input class="btn" id="parentEmail" placeholder="(optional)" style="padding:10px 12px; min-width:260px" type="email"/>
<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#aeb8d6">
<input id="consent" type="checkbox"/> I have permission to email this report
            </label>
<button class="btn primary" id="startBtn" type="button">Start Test</button>
</div>
<div class="warn" id="accessError" style="display:none; margin-top:10px"></div>
<div class="kpis" style="margin-top:14px">
<div class="kpiBox"><div class="label">Math</div><div class="num">10</div></div>
<div class="kpiBox"><div class="label">English</div><div class="num">10</div></div>
<div class="kpiBox"><div class="label">Total</div><div class="num">20</div></div>
</div>
</div>
<div>
<div class="label">Progress</div>
<div class="progBar"><div class="progFill" id="progFill"></div></div>
<p class="examMuted" style="margin-top:6px">Updates after every answer.</p>
</div>
</div>
</section>
<section class="panel" id="mount">
<p class="examMuted">Awaiting start…</p>
</section>
<section class="panel" id="report"></section>
<!-- Formspree notify -->
<form action="https://formspree.io/f/mzzvlgge" id="notifyForm" method="POST" style="display:none">
<input name="_subject" type="hidden" value="Ripa Diagnostic: Student Completed"/>
<input autocomplete="off" name="_gotcha" style="display:none" tabindex="-1" type="text"/>
<input id="notify-grade" name="grade" type="hidden"/>
<input id="notify-mathPct" name="mathPct" type="hidden"/>
<input id="notify-engPct" name="engPct" type="hidden"/>
<input id="notify-confidence" name="confidence" type="hidden"/>
<input id="notify-mathLevel" name="mathLevel" type="hidden"/>
<input id="notify-elaLevel" name="elaLevel" type="hidden"/>
<input id="notify-summary" name="summary" type="hidden"/>
<input id="notify-student" name="studentName" type="hidden"/>
<input id="notify-parentEmail" name="parentEmail" type="hidden"/>
</form>
</main>
<noscript>
<p style="color:red; text-align:center; margin-top:20px;">
      This diagnostic requires JavaScript. Please enable it in your browser.
    </p>
</noscript>
<!-- Prefill access code if provided via ?code=... (from lock.html) -->
<script type="module">
    try {
      const params = new URLSearchParams(window.location.search);
      const code = (params.get('code') || '').trim();
      if (code) {
        const input = document.getElementById('accessCode');
        if (input) input.value = code;
      } else {
        // optional convenience: remember last code used on this device
        const last = (localStorage.getItem('rea_diag_last_code') || '').trim();
        if (last) {
          const input = document.getElementById('accessCode');
          if (input) input.value = last;
        }
      }
    } catch {}
  </script>
<!-- Load app.js directly -->
<script src="./app.js" type="module"></script>
</body>
</html>
