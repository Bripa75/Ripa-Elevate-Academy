<script>
    (function () {
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.get('clear') === '1') {
          try { localStorage.removeItem('rea_diag_last_code'); } catch {}
        }
        const code = (params.get('code') || '').trim();
        if (code) {
          location.replace(`diagnostic/diagnostic-test.html?code=${encodeURIComponent(code)}`);
          return;
        }
        // Default: send the user to lock, which validates the code in Supabase
        location.replace('lock.html');
      } catch (e) {
        location.replace('lock.html');
      }
    })();
  </script>
